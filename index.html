<!DOCTYPE html> <!-- Usando HTML5 -->
<html lang="pt-br"> <!-- usando HTML e linguagem português do Brasil -->
<head> <!-- Cabeça(meta dados) -->
    <meta charset="UTF-8"> <!-- Padrão universal de codificação de caracteres para a língua portuguesa -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Ocupar 100% da tela e não ter zoom -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <!-- Colocando favicon na aba da página -->
    <title>Projeto Redes Sociais</title>
    <!-- Título na aba da página -->
    <link rel="stylesheet" href="estilos/style.css">
    <!-- Chamando o css interno -->
</head> <!-- cabeça(meta dados) (fechamento da tag)-->
<body> <!-- Corpo da página -->
    <main> <!-- Principal -->
        <section id="telefone"> <!-- Abrindo seção para o telefone -->
            <iframe src="home.html" name="tela"  id="tela" frameborder="0">
                Seu navegador não é compatível com isso.
            </iframe>
            <!-- Chamando iframe e colocando aviso se não funcionar -->
        </section> <!-- Fechando a seção do telefone -->
        <section id="redes-sociais"> <!-- Abrindo seção para as redes sociais -->
            <a  href="home.html" target="tela"><img src="imagens/logo-home.jpg" alt="Home"></a><br><!-- Página principal do telefone -->
            <a  href="youtube.html" target="tela"><img src="imagens/logo-youtube.jpg" alt="YouTube"></a><br><!-- Página do Youtube -->
            <a  href="github.html" target="tela"><img src="imagens/logo-github.jpg" alt="GitHub"></a><br><!-- Página do GitHub -->
            <a  href="instagram.html" target="tela"><img src="imagens/logo-instagram.jpg" alt="Instagram"></a><br> <!-- Página do Instagram -->
            <a  href="twitter.html" target="tela"><img src="imagens/logo-twitter.jpg" alt="Twitter"></a><br><!-- Página do Twitter(X) -->
            <a  href="facebook.html" target="tela"><img src="imagens/logo-facebook.jpg" alt="Facebook"></a><!-- Página do Facebook -->
        </section> <!-- Fechando a seção das redes sociais -->
    </main> <!-- Fechando principal -->
</body> <!-- Fechando o corpo da página -->
</html> <!-- Fechando o HTML -->
