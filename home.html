<!DOCTYPE html> <!-- Usando HTML5 -->
<html lang="pt-br"> <!-- Usando HTML e linguagem português do Brasil -->
<head> <!-- Cabeça(meta dados) -->
    <meta charset="UTF-8"> <!-- Padrão universal de codificação de caracteres para a língua portuguesa -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><!-- Ocupar 100% da tela e não ter zoom -->
    <title>Home</title>
    <!-- Título na aba da página -->

    <!-- Estilo externo -->
    <style>

        /* Global */
        *{
            margin: 0px; /* margem de 0px */
            padding: 0px; /* preenchimento 0px */
        }

        /* Corpo */
        body{
            width: 100vw; /* 100 da largura da viewport */
            height: 100vh; /* 100 da altura da viewport */
            background: url('imagens/tela-home.jpg') top center no-repeat;
            /* Configurando o fundo ter url para aparecer a tela principal, arrumar a posição e essa tela não se repetir */
            background-size: cover;
            /* Que esse fundo pode ser recortado para caber em toda tela */
        }
    </style> <!-- Estilo externo (fechando tag) -->
</head> <!-- Cabeça(meta dados) (fechando tag) -->
<body> <!-- Corpo -->
    
</body> <!-- Corpo (fechando tag) -->
</html> <!-- fechando HTML -->
