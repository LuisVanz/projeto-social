<!DOCTYPE html> <!-- Usando HTML5 -->
<html lang="pt-br"> <!-- usando HTML e linguagem português do Brasil -->
<head> <!-- Cabeça(meta dados) -->
    <meta charset="UTF-8"> <!-- Padrão universal de codificação de caracteres para a língua portuguesa -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Ocupar 100% da tela e não ter zoom -->
    <title>YouTube</title> <!-- Título na aba da página -->
    <link rel="stylesheet" href="estilos/social.css">
    <!-- Chamando o css interno -->
</head><!-- Cabeça(meta dados) (fechando tag) -->
<body> <!-- Corpo -->
    <img src="imagens/tela-youtube.png" alt="YouTube"> <!-- Imagem da tela do Youtube -->
    <a href="https://www.youtube.com/@cursoemvideo/playlists" target="_blank">ACESSE</a>
    <!-- link para a playlist de videos do CursoemVideo e abrir em uma nova guia -->
</body> <!-- Corpo (fechando tag) -->
</html> <!-- Fechando HTML -->
